name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Veröffentlichen
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Einmalige Ersteinrichtung nötig:
      #   Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
      # Der Standard-GITHUB_TOKEN darf ein Pages-Projekt nicht selbst anlegen;
      # `enablement: true` funktioniert nur mit einem PAT/App-Token.
      - name: Pages konfigurieren
        uses: actions/configure-pages@v6

      - name: Artefakt bündeln (statische Dateien)
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deployment
        id: deployment
        uses: actions/deploy-pages@v5
