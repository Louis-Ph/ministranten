name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Veröffentlichen
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pages konfigurieren (und bei Bedarf aktivieren)
        uses: actions/configure-pages@v6
        with:
          # Aktiviert GitHub Pages automatisch, falls noch nicht eingerichtet.
          # Erfordert die Permission `pages: write` (oben deklariert).
          enablement: true

      - name: Artefakt bündeln (statische Dateien)
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deployment
        id: deployment
        uses: actions/deploy-pages@v5
