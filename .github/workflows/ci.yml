name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit-Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Unit-Tests ausführen
        run: npm run test:unit

  e2e:
    name: End-to-End-Tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Playwright-Browser installieren
        run: npx playwright install --with-deps chromium

      - name: Playwright ausführen (Chromium)
        env:
          # HTML-Reporter zusätzlich aktivieren, damit ein Artefakt produziert wird.
          PLAYWRIGHT_HTML_REPORT: playwright-report
        run: npx playwright test --project=chromium --reporter=list,html

      - name: Playwright-Report hochladen
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

