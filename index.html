<style>
/* ===================================================================
   Minis Wettstetten – Monolithic Stylesheet
   Normen-Orientierung: WCAG 2.2 AA / EN 301 549, ISO 9241-110/-171,
   DSGVO-konforme Darstellung, druckfähige Ansichten (A4).
   =================================================================== */

:root {
  --c-bg: #f2f5f8;
  --c-card: #ffffff;
  --c-primary: #0066cc;
  --c-primary-ink: #ffffff;
  --c-danger: #e63946;
  --c-danger-ink: #ffffff;
  --c-success: #00cc88;
  --c-success-ink: #0b2e22;
  --c-text: #1d3557;
  --c-text-muted: #5a6b85;
  --c-border: #e3e9f0;
  --c-overlay: rgba(29, 53, 87, 0.55);
  --c-focus: #ffbe0b;

  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  --shadow-sm: 0 1px 2px rgba(29, 53, 87, 0.08);
  --shadow-md: 0 4px 14px rgba(29, 53, 87, 0.10);
  --shadow-lg: 0 10px 30px rgba(29, 53, 87, 0.18);
  --shadow-xl: 0 20px 60px rgba(29, 53, 87, 0.25);

  --z-app: 1;
  --z-bottom-nav: 50;
  --z-toast: 9000;
  --z-modal: 9500;
  --z-forced-modal: 9999;

  --header-h: 64px;
  --nav-h: 72px;

  --motion-fast: 140ms;
  --motion-med: 240ms;

  --font: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--c-bg);
  color: var(--c-text);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  min-height: 100svh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

:focus-visible {
  outline: 3px solid var(--c-focus);
  outline-offset: 2px;
  border-radius: 6px;
}

a { color: var(--c-primary); }
a:hover { text-decoration: underline; }

/* Skip link for keyboard / screenreader users (EN 301 549) */
.skip-link {
  position: absolute;
  top: -100px;
  left: 12px;
  padding: 10px 16px;
  background: var(--c-text);
  color: #fff;
  border-radius: var(--r-sm);
  z-index: var(--z-forced-modal);
  transition: top var(--motion-fast) ease;
}
.skip-link:focus { top: 12px; }

/* === App shell === */

#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100svh;
}

.app-header {
  position: sticky;
  top: 0;
  height: var(--header-h);
  background: var(--c-card);
  border-bottom: 1px solid var(--c-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 20;
}
.app-header .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  color: var(--c-text);
  min-width: 0;
}
.app-header .brand .logo {
  flex: 0 0 auto;
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: linear-gradient(135deg, #0066cc, #3a86ff);
  display: grid;
  place-items: center;
  color: #fff;
}
.app-header .brand-text {
  min-width: 0;
}
.app-header .brand-title,
.app-header .brand-subtitle {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.app-header .header-actions {
  flex: 0 0 auto;
  flex-wrap: nowrap;
}
.app-header .header-actions .btn::before {
  display: none;
}

@media (max-width: 520px) {
  .app-header {
    padding: 0 12px;
    gap: 8px;
  }
  .app-header .brand {
    flex: 1 1 auto;
    gap: 8px;
  }
  .app-header .brand .logo {
    width: 32px;
    height: 32px;
    border-radius: 9px;
  }
  .app-header .brand-title { font-size: 15px; }
  .app-header .brand-subtitle { font-size: 11px; }
  .app-header .header-actions {
    gap: 6px;
  }
  .app-header .header-actions .btn {
    width: 44px;
    height: 44px;
    padding: 0;
    border-radius: 12px;
  }
  .app-header .header-actions .btn > i {
    display: none;
  }
  .app-header .header-actions .btn[aria-label="Seite drucken"]::before {
    content: "⎙";
    display: block;
    font-size: 19px;
    font-weight: 800;
    line-height: 1;
  }
  .app-header .header-actions .btn[aria-label="App installieren"]::before {
    content: "↓";
    display: block;
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .app-header .header-actions .btn[aria-label="Abmelden"]::before {
    content: "↪";
    display: block;
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
  }
  .app-header .header-actions .btn-label {
    display: none;
  }
}

.main-content {
  flex: 1;
  padding: 16px 16px calc(var(--nav-h) + 24px);
  max-width: 960px;
  width: 100%;
  margin: 0 auto;
}

/* Das Desktop-Override für Header, Navigation und Content steht weiter unten,
   nach den mobilen Basisregeln, damit der Kaskaden-Reihenfolge-Konflikt auf
   Viewports ≥ 960 px gelöst wird (siehe Abschnitt „Concurrent UI Design“). */

/* === Login / Welcome === */

.login-wrapper {
  min-height: 100vh;
  min-height: 100svh;
  display: grid;
  place-items: center;
  background: linear-gradient(160deg, #0066cc 0%, #3a86ff 45%, #1d3557 120%);
  padding: 24px 16px;
}

.login-card {
  width: 100%;
  max-width: 420px;
  background: var(--c-card);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-xl);
  padding: 28px 22px 22px;
  text-align: center;
}
.login-card .logo-lg {
  width: 72px;
  height: 72px;
  margin: 4px auto 12px;
  border-radius: 22px;
  background: linear-gradient(135deg, #0066cc, #3a86ff);
  display: grid;
  place-items: center;
  color: #fff;
  font-size: 28px;
  box-shadow: var(--shadow-md);
}
.login-card h1 { margin: 4px 0 4px; font-size: 22px; letter-spacing: -0.01em; }
.login-card p.sub { color: var(--c-text-muted); margin: 0 0 20px; }

.login-actions { display: flex; flex-direction: column; gap: 10px; }

.dev-slot { margin-top: 22px; padding-top: 16px; border-top: 1px dashed var(--c-border); }

/* === Buttons === */

.btn {
  -webkit-appearance: none;
  appearance: none;
  border: 1px solid transparent;
  font: inherit;
  font-weight: 600;
  padding: 12px 18px;
  min-height: 44px; /* WCAG 2.2 Target Size AA */
  min-width: 44px;
  border-radius: var(--r-md);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform var(--motion-fast) ease, box-shadow var(--motion-fast) ease, background-color var(--motion-fast) ease, border-color var(--motion-fast) ease;
  text-decoration: none;
  line-height: 1.2;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

.btn-primary { background: var(--c-primary); color: var(--c-primary-ink); box-shadow: var(--shadow-sm); }
.btn-primary:hover:not(:disabled) { background: #0058b4; box-shadow: var(--shadow-md); }

.btn-danger { background: var(--c-danger); color: var(--c-danger-ink); box-shadow: var(--shadow-sm); }
.btn-danger:hover:not(:disabled) { background: #c62f3b; box-shadow: var(--shadow-md); }

.btn-success { background: var(--c-success); color: var(--c-success-ink); box-shadow: var(--shadow-sm); }
.btn-success:hover:not(:disabled) { background: #00b377; box-shadow: var(--shadow-md); }

.btn-ghost { background: transparent; color: var(--c-text); border-color: var(--c-border); }
.btn-ghost:hover:not(:disabled) { background: #f5f8fb; }

.btn-subtle { background: #eef2f7; color: var(--c-text); }
.btn-subtle:hover:not(:disabled) { background: #e2e9f2; }

.btn-block { width: 100%; }

/* === Inputs === */

.field { text-align: left; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.field label { font-size: 13px; font-weight: 600; color: var(--c-text); }
.field .hint { font-size: 12px; color: var(--c-text-muted); }

.input, .textarea, .select {
  font: inherit;
  color: var(--c-text);
  background: #fff;
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  padding: 12px 14px;
  min-height: 44px;
  width: 100%;
  transition: border-color var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--c-primary);
  outline: none;
  box-shadow: 0 0 0 4px rgba(0,102,204,0.18);
}
.textarea { resize: vertical; min-height: 96px; }

.checkbox-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.checkbox-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--c-primary); }

/* === Cards === */

.card {
  background: var(--c-card);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  padding: 18px;
  margin-bottom: 14px;
  border: 1px solid var(--c-border);
}

.service-card {
  background: var(--c-card);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  padding: 16px 18px;
  margin-bottom: 12px;
  border: 1px solid var(--c-border);
  border-left: 6px solid var(--c-primary);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: box-shadow var(--motion-fast) ease, transform var(--motion-fast) ease;
}
.service-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.service-card.replacement { animation: blink-red 1.4s ease-in-out infinite; border-left-color: var(--c-danger); }

@keyframes blink-red {
  0%, 100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.00); }
  50%      { box-shadow: 0 0 0 6px rgba(230, 57, 70, 0.18); }
}

.service-card .row-1 { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.service-card h3 { margin: 0; font-size: 17px; letter-spacing: -0.01em; }
.service-card .meta { color: var(--c-text-muted); font-size: 13px; }
.service-card .desc { color: var(--c-text); font-size: 14px; white-space: pre-wrap; }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #eef2f7;
  color: var(--c-text);
  font-size: 12px;
  font-weight: 600;
  margin: 2px 4px 2px 0;
}
.pill.you { background: #d7ecff; color: #0058b4; }
.pill.slots { background: #eef9f3; color: #0a7a54; }
.pill.low { background: #fde7e9; color: #a11624; }

.badge-replacement {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: #fde7e9;
  color: #a11624;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* === Toast === */

#toast-container {
  position: fixed;
  left: 0; right: 0; bottom: calc(var(--nav-h) + 14px);
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  padding: 0 12px;
  pointer-events: none;
  z-index: var(--z-toast);
}
.toast {
  pointer-events: none;
  max-width: 560px;
  width: 100%;
  background: var(--c-text);
  color: #fff;
  border-radius: var(--r-md);
  padding: 12px 16px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  animation: toast-in var(--motion-med) ease-out;
  border-left: 4px solid #fff;
}
.toast.info    { background: var(--c-primary); border-left-color: #cfe3ff; }
.toast.success { background: var(--c-success); color: var(--c-success-ink); border-left-color: #0a7a54; }
.toast.warn    { background: #ffb703; color: #3a2c00; border-left-color: #b07700; }
.toast.error   { background: var(--c-danger); border-left-color: #7a0c16; }

@keyframes toast-in {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* === Modal === */

.modal-backdrop {
  position: fixed; inset: 0;
  background: var(--c-overlay);
  z-index: var(--z-modal);
  display: grid;
  place-items: center;
  padding: 16px;
  animation: fade-in var(--motion-fast) ease-out;
}
.modal-backdrop.forced { z-index: var(--z-forced-modal); background: rgba(29, 53, 87, 0.78); }
.modal {
  background: var(--c-card);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-xl);
  max-width: 560px;
  width: 100%;
  max-height: calc(100vh - 32px);
  overflow: auto;
  padding: 22px;
  animation: modal-in var(--motion-med) ease-out;
}
.modal h2 { margin: 0 0 4px; font-size: 20px; }
.modal .modal-sub { color: var(--c-text-muted); margin: 0 0 16px; font-size: 14px; }
.modal .modal-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; justify-content: flex-end; }

@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes modal-in { from { transform: translateY(20px) scale(0.98); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

/* === Bottom Navigation === */

.bottom-nav {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: var(--nav-h);
  background: var(--c-card);
  border-top: 1px solid var(--c-border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
  z-index: var(--z-bottom-nav);
  box-shadow: 0 -2px 12px rgba(29,53,87,0.05);
}
.nav-btn {
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  border: none;
  color: var(--c-text-muted);
  min-width: 52px;
  min-height: 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font: inherit;
  font-size: 11px;
  font-weight: 600;
  border-radius: 12px;
  cursor: pointer;
  padding: 6px 8px;
  flex: 1 1 0;
  transition: color var(--motion-fast) ease, background var(--motion-fast) ease;
}
.nav-btn i { font-size: 20px; }
.nav-btn.active { color: var(--c-primary); background: #eaf3ff; }
.nav-btn:hover:not(.active) { color: var(--c-text); }

/* Desktop-Layout: feste Sidebar statt Bottom-Navigation. Dieses Block steht
   bewusst nach den Basisregeln, damit er sie auf Viewports ≥ 960 px wirklich
   überschreibt (gleiche Selektor-Spezifität). */
@media (min-width: 960px) {
  /* Reserve sidebar space only when the sidebar is actually rendered (i.e.
     after login). Without :has(), the login screen would inherit a 260px
     left padding for a sidebar that does not exist, leaving a gray gutter. */
  #app:has(.bottom-nav) { padding-left: 260px; }
  .bottom-nav {
    left: 0; right: auto; top: 0; bottom: 0;
    width: 240px; height: 100vh;
    flex-direction: column;
    border-top: none;
    border-right: 1px solid var(--c-border);
    padding: calc(var(--header-h) + 16px) 14px 14px;
    justify-content: flex-start;
    align-items: stretch;
    gap: 6px;
    box-shadow: 2px 0 12px rgba(29,53,87,0.05);
  }
  .bottom-nav .nav-btn {
    /* Reset the mobile flex:1 1 0 (which makes nav buttons share row width
       on bottom nav). On the desktop sidebar each row should be its natural
       height instead of stretching to share the column. */
    flex: 0 0 auto;
    flex-direction: row;
    justify-content: flex-start;
    gap: 14px;
    padding: 12px 14px;
    font-size: 15px;
    border-radius: 12px;
    min-height: 44px;
  }
  .bottom-nav .nav-btn i { font-size: 18px; }
  .bottom-nav .nav-btn span { font-size: 15px; }
  .app-header {
    position: fixed;
    top: 0; left: 240px; right: 0;
    width: auto;
  }
  .main-content {
    padding-top: calc(var(--header-h) + 16px);
    padding-bottom: 24px;
    padding-left: 24px;
    padding-right: 24px;
    max-width: 1120px;
    margin: 0 auto;
  }
}

/* === Chat === */

.chat-wrap { display: flex; flex-direction: column; gap: 10px; }
.chat-list {
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-lg);
  padding: 12px;
  min-height: 280px;
  max-height: 60vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: var(--shadow-sm);
}
/* Empty state — without it the chat-list collapsed to a thin bar above
   the input, which made the input feel like the page's hero element. */
.chat-list:empty {
  align-items: center;
  justify-content: center;
}
.chat-list:empty::before {
  content: 'Noch keine Nachrichten — schreib die erste!';
  color: var(--c-text-muted);
  font-size: 14px;
  text-align: center;
  padding: 24px 12px;
}
.chat-msg {
  display: flex; flex-direction: column; gap: 2px;
  padding: 8px 12px;
  border-radius: 14px;
  background: #f5f8fb;
  border: 1px solid transparent;
  max-width: 90%;
  word-wrap: break-word;
  overflow-wrap: anywhere;
}
.chat-msg.mine  { background: #d7ecff; align-self: flex-end; }
.chat-msg.system{ background: #fff; border: 2px solid var(--c-danger); color: var(--c-text); align-self: stretch; }
.chat-msg .author { font-weight: 700; font-size: 12px; }
.chat-msg .time { font-size: 11px; color: var(--c-text-muted); }
.chat-msg .body { white-space: pre-wrap; }

.chat-form { display: flex; gap: 8px; }
.chat-form .input { flex: 1; }

/* === Stats / Leaderboard === */

.leaderboard { display: flex; flex-direction: column; gap: 6px; }
.lb-row {
  display: grid; grid-template-columns: 40px minmax(0, 1fr) auto auto auto;
  gap: 10px;
  align-items: center;
  padding: 10px 14px;
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
}
.lb-row .rank { font-weight: 800; font-size: 18px; color: var(--c-primary); }
.lb-row .name { font-weight: 600; min-width: 0; overflow-wrap: anywhere; }
.lb-row .stat { font-variant-numeric: tabular-nums; font-size: 14px; min-width: 0; }
.lb-row .stat b { display: block; font-size: 16px; color: var(--c-text); }
.lb-row .stat small { color: var(--c-text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

@media (max-width: 520px) {
  .lb-row {
    grid-template-columns: 34px minmax(0, 1fr);
    align-items: start;
  }
  .lb-row .rank {
    grid-row: 1 / span 4;
  }
  .lb-row .stat {
    grid-column: 2;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .lb-row .stat b {
    min-width: 1.5em;
  }
  .lb-row .stat small {
    letter-spacing: 0;
    text-transform: none;
  }
}

/* === Utility === */

.row-flex { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.role-row {

<body>

<a class="skip-link" href="#app">Zum Inhalt springen</a>

<!-- Live region for toast announcements (WCAG 4.1.3) -->
<div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

<div id="app" role="application" aria-label="Minis Wettstetten Anwendung"></div>

<div id="modal-root" aria-live="polite"></div>

<script>
/* ===================================================================
   Minis Wettstetten – Monolithic Vanilla JS
   Architektur: Finite State Machine mit Proxy-Reaktivität, semantische Silos,
   XSS-sichere DOM-Konstruktion (kein innerHTML bei Nutzerdaten),
   Service Worker via Blob URL, Toast-Manager statt alert().
   =================================================================== */

(function () {
  'use strict';

  // -----------------------------------------------------------------
  // 0. URL params + constants
  // -----------------------------------------------------------------
  const urlParams = new URLSearchParams(location.search);
  const MAIL_DOMAIN = '@minis-wettstetten.de';
  const DEV_MASTERKEY = 'miniswettapp';
  const CHAT_LIMIT = 40;
  const SYSTEM_ALERT_WINDOW_MS = 2 * 60 * 60 * 1000; // 2h
  const PWA_INSTALL_LABEL = 'App installieren';
  const PWA_INSTALLED_MESSAGE = 'App installiert.';
  const PWA_INSTALL_UNAVAILABLE_MESSAGE = 'Installation ist in diesem Browser gerade nicht verfügbar.';
  const DB_PATHS = Object.freeze({
    USERS: 'users',
    PUBLIC_PROFILES: 'publicProfiles',
    SERVICES: 'services',
    STATS: 'stats',
    CHAT: 'chat'
  });
  const CLOUD_BACKUP_PATHS = Object.freeze([
    DB_PATHS.USERS,
    DB_PATHS.PUBLIC_PROFILES,
    DB_PATHS.SERVICES,
    DB_PATHS.STATS,
    DB_PATHS.CHAT
  ]);

  function dbPath(root) {
    return Array.prototype.slice.call(arguments)
      .filter(part => part != null && part !== '')
      .join('/');
  }

  function publicProfileFromUser(profile) {
    const username = profile && profile.username ? profile.username : '';
    const displayName = profile && profile.displayName ? profile.displayName : username;
    return { username, displayName };
  }

  // -----------------------------------------------------------------
  // 1. Backend-Wahl (Vercel/Supabase Cloud / SQLite lokal / Mock In-Memory)
  //    Auswahl verwalteter Persistenz über localStorage, URL-Override
  //    für Tests (?backend=sqlite|cloud|mock oder ?mock=1).
  // -----------------------------------------------------------------
  const BACKENDS = Object.freeze({ CLOUD: 'cloud', SQLITE: 'sqlite', MOCK: 'mock' });
  const BACKEND_LABELS = {
    cloud:    'Vercel + Supabase (Cloud)',
    sqlite:   'SQLite (lokal, Browser-Speicher)',
    mock:     'Mock (nur Arbeitsspeicher, für Tests)'
  };
  const BACKEND_STORAGE_KEY = 'minis.backend';

  function readBackendSetting() {
    const fromUrl = urlParams.get('backend');
    if (urlParams.get('mock') === '1') return BACKENDS.MOCK;
    if (fromUrl && Object.values(BACKENDS).includes(fromUrl)) return fromUrl;
    try {
      const v = localStorage.getItem(BACKEND_STORAGE_KEY);
      if (v && Object.values(BACKENDS).includes(v)) return v;
    } catch (_) { /* storage disabled */ }
    return BACKENDS.CLOUD;
  }
  function writeBackendSetting(value) {
    if (!Object.values(BACKENDS).includes(value)) throw new Error('Unbekanntes Backend.');
    try { localStorage.setItem(BACKEND_STORAGE_KEY, value); } catch (_) { /* silent */ }
  }
  let ACTIVE_BACKEND = readBackendSetting();

  // -----------------------------------------------------------------
  // 2. Cloud-Konfiguration (nur über Vercel API-Routen; keine DB-Secrets im Browser)
  // -----------------------------------------------------------------
  let db, auth, createUserOnBackend;
  const CLOUD_SESSION_KEY = 'minis.cloud.session';
  const CLOUD_OAUTH_STATE_KEY = 'minis.cloud.oauth.state';
  const CLOUD_OAUTH_VERIFIER_KEY = 'minis.cloud.oauth.verifier';
  const CLOUD_OAUTH_PROVIDER_KEY = 'minis.cloud.oauth.provider';
  const FREE_CLOUD_OAUTH_PROVIDER_IDS = Object.freeze(['google', 'github', 'azure']);
  const CLOUD_OAUTH_PROVIDERS = Object.freeze([
    { id: 'google', label: 'Google', icon: 'google' },
    { id: 'github', label: 'GitHub', icon: 'github' },
    { id: 'azure', label: 'Microsoft', icon: 'microsoft' },
    { id: 'apple', label: 'Apple', icon: 'apple' }
  ]);
  let CLOUD_CONFIG = { auth: { providers: FREE_CLOUD_OAUTH_PROVIDER_IDS.slice() } };

  function currentCloudSession() {
    try {
      const raw = sessionStorage.getItem(CLOUD_SESSION_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }
  function saveCloudSession(session) {
    if (!session || !session.access_token) return null;
    const expiresAt = session.expires_at || Math.floor(Date.now() / 1000) + Number(session.expires_in || 3600);
    const stored = Object.assign({}, session, { expires_at: expiresAt });
    try { sessionStorage.setItem(CLOUD_SESSION_KEY, JSON.stringify(stored)); } catch (_) {}
    return stored;
  }
  function clearCloudSession() {
    try { sessionStorage.removeItem(CLOUD_SESSION_KEY); } catch (_) {}
  }
  function cloudAuthHeaders(extra) {
    const headers = Object.assign({ 'Content-Type': 'application/json' }, extra || {});
    const session = currentCloudSession();
    if (session && session.access_token) headers.Authorization = 'Bearer ' + session.access_token;
    return headers;
  }
  async function refreshCloudSession() {
    const session = currentCloudSession();
    if (!session || !session.refresh_token) return null;
    const res = await fetch('./api/auth/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: session.refresh_token })
    });
    if (!res.ok) { clearCloudSession(); return null; }
    const data = await res.json();
    return saveCloudSession(data.session);
  }
  async function cloudRequest(path, options, retried) {
    const opts = Object.assign({ method: 'GET' }, options || {});
    opts.headers = cloudAuthHeaders(opts.headers);
    if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
    const res = await fetch(path, opts);
    if (res.status === 401 && !retried && await refreshCloudSession()) {
      return cloudRequest(path, options, true);
    }
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) {
      const err = new Error((data && data.error) || 'Cloud API Fehler');
      err.code = data && data.code;
      throw err;
    }
    return data;
  }
  function cloudRedirectTarget() {
    return location.origin + location.pathname + '?backend=' + encodeURIComponent(BACKENDS.CLOUD);
  }
  function randomOAuthState() {
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  // RFC 7636 code_verifier: 43..128 chars of [A-Za-z0-9_-~.].
  // We use 64 base64url-of-random-bytes chars.
  function randomCodeVerifier() {
    const bytes = new Uint8Array(48);
    crypto.getRandomValues(bytes);
    return base64urlFromBytes(bytes);
  }
  function base64urlFromBytes(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 1) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  async function pkceChallengeFromVerifier(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return base64urlFromBytes(new Uint8Array(digest));
  }
  // Handles both implicit flow (#access_token=…) and PKCE (?code=…&state=…)
  // returns from Supabase. Also surfaces provider/Supabase errors cleanly.
  async function captureCloudSessionFromCallback() {
    // 1. Did Supabase bounce us back with an error?
    if (location.search && location.search.indexOf('error') !== -1) {
      const qs = new URLSearchParams(location.search);
      const error = qs.get('error') || qs.get('error_code');
      const desc = qs.get('error_description');
      if (error) {
        const pretty = desc ? decodeURIComponent(desc).replace(/\+/g, ' ') : error;
        try { sessionStorage.removeItem(CLOUD_OAUTH_STATE_KEY); } catch (_) {}
        try { sessionStorage.removeItem(CLOUD_OAUTH_VERIFIER_KEY); } catch (_) {}
        try { sessionStorage.removeItem(CLOUD_OAUTH_PROVIDER_KEY); } catch (_) {}
        try {
          history.replaceState(null, '',
            location.pathname + stripOAuthQuery(location.search));
        } catch (_) {}
        throw new Error('OAuth-Fehler: ' + pretty);
      }
    }
    // 2. Implicit flow: tokens in URL fragment (#access_token=…).
    if (location.hash && location.hash.indexOf('access_token=') !== -1) {
      const params = new URLSearchParams(location.hash.replace(/^#/, ''));
      const returnedState = params.get('state');
      const expectedState = sessionStorage.getItem(CLOUD_OAUTH_STATE_KEY);
      if (expectedState && returnedState !== expectedState) {
        clearCloudSession();
        try { sessionStorage.removeItem(CLOUD_OAUTH_STATE_KEY); } catch (_) {}
        try { sessionStorage.removeItem(CLOUD_OAUTH_VERIFIER_KEY); } catch (_) {}
        throw new Error('OAuth-State ungültig.');
      }
      try { sessionStorage.removeItem(CLOUD_OAUTH_STATE_KEY); } catch (_) {}
      try { sessionStorage.removeItem(CLOUD_OAUTH_VERIFIER_KEY); } catch (_) {}
      try { sessionStorage.removeItem(CLOUD_OAUTH_PROVIDER_KEY); } catch (_) {}
      const session = saveCloudSession({
        access_token: params.get('access_token'),
        refresh_token: params.get('refresh_token'),
        expires_in: Number(params.get('expires_in') || 3600),
        token_type: params.get('token_type') || 'bearer'
      });
      try { history.replaceState(null, '', location.pathname + location.search); } catch (_) {}
      return session;
    }
    // 3. PKCE flow: authorization code in query string.
    if (location.search && location.search.indexOf('code=') !== -1) {
      const qs = new URLSearchParams(location.search);
      const code = qs.get('code');
      if (!code) return null;
      const returnedState = qs.get('state');
      const expectedState = sessionStorage.getItem(CLOUD_OAUTH_STATE_KEY);
      const codeVerifier = sessionStorage.getItem(CLOUD_OAUTH_VERIFIER_KEY);
      // No expected state means this ?code= is not ours (ignore silently).
      if (!expectedState) return null;
      if (expectedState !== returnedState) {
        clearCloudSession();
        try { sessionStorage.removeItem(CLOUD_OAUTH_STATE_KEY); } catch (_) {}
        try { sessionStorage.removeItem(CLOUD_OAUTH_VERIFIER_KEY); } catch (_) {}
        throw new Error('OAuth-State ungültig.');
      }
      if (!codeVerifier) throw new Error('OAuth-Verifier fehlt in dieser Sitzung.');
      try { sessionStorage.removeItem(CLOUD_OAUTH_STATE_KEY); } catch (_) {}
      try { sessionStorage.removeItem(CLOUD_OAUTH_VERIFIER_KEY); } catch (_) {}
      try { sessionStorage.removeItem(CLOUD_OAUTH_PROVIDER_KEY); } catch (_) {}
      const res = await fetch('./api/auth/callback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, code_verifier: codeVerifier })
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) {
        const msg = data && data.error ? data.error : 'OAuth-Rückgabe fehlgeschlagen.';
        throw new Error(msg);
      }
      try {
        history.replaceState(null, '',
          location.pathname + stripOAuthQuery(location.search));
      } catch (_) {}
      return saveCloudSession(data.session);
    }
    return null;
  }
  // Backwards-compatible alias for the implicit-only helper name.
  function captureCloudSessionFromHash() {
    // Best-effort synchronous path (implicit flow only).
    if (!location.hash || location.hash.indexOf('access_token=') === -1) return null;
    return captureCloudSessionFromCallback();
  }
  function stripOAuthQuery(search) {
    if (!search) return '';
    const qs = new URLSearchParams(search.replace(/^\?/, ''));
    ['code', 'state', 'error', 'error_code', 'error_description', 'provider'].forEach(k => qs.delete(k));
    const rest = qs.toString();
    return rest ? '?' + rest : '';
  }
  async function startOAuth(provider) {
    const allowed = enabledCloudOAuthProviders().some(p => p.id === provider);
    if (!allowed) return toast('OAuth-Anbieter nicht unterstützt.', 'error');
    let state, codeVerifier, codeChallenge;
    try {
      state = randomOAuthState();
      codeVerifier = randomCodeVerifier();
      codeChallenge = await pkceChallengeFromVerifier(codeVerifier);
    } catch (e) {
      console.error('PKCE setup failed', e);
      return toast('Browser unterstützt keine Web-Crypto. OAuth nicht möglich.', 'error');
    }
    try {
      sessionStorage.setItem(CLOUD_OAUTH_STATE_KEY, state);
      sessionStorage.setItem(CLOUD_OAUTH_VERIFIER_KEY, codeVerifier);
      sessionStorage.setItem(CLOUD_OAUTH_PROVIDER_KEY, provider);
    } catch (_) {}
    const url = './api/auth/start?provider=' + encodeURIComponent(provider) +
      '&redirectTo=' + encodeURIComponent(cloudRedirectTarget()) +
      '&state=' + encodeURIComponent(state) +
      '&code_challenge=' + encodeURIComponent(codeChallenge);
    location.href = url;
  }
  function createCloudSnapshot(value) {
    return { val: () => value == null ? null : value };
  }
  function createCloudDatabase() {
    function ref(p, limit) {
      p = '/' + (p || '').replace(/^\/+|\/+$/g, '');
      return {
        key: p.split('/').pop() || null,
        async once() {
          const data = await cloudRequest('./api/data?path=' + encodeURIComponent(p) + (limit ? '&limit=' + encodeURIComponent(limit) : ''));
          return createCloudSnapshot(data.value);
        },
        async set(value) { await cloudRequest('./api/data', { method: 'PUT', body: { path: p, value } }); },
        async update(obj) { await cloudRequest('./api/data', { method: 'PATCH', body: { path: p, value: obj } }); },
        async remove() { await cloudRequest('./api/data', { method: 'DELETE', body: { path: p } }); },
        push(value) {
          const id = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
          const child = ref(p + '/' + id);
          child.key = id;
          if (value !== undefined) child.set(value).catch(err => console.warn('cloud push', err));
          return child;
        },
        on(_evt, cb) {
          let stopped = false;
          const tick = async () => {
            if (stopped) return;
            try { cb(await this.once()); }
            catch (err) { console.warn('cloud subscribe', err); }
          };
          tick();
          const timer = setInterval(tick, 4000);
          this._timer = timer;
        },
        off() { if (this._timer) clearInterval(this._timer); },
        limitToLast(n) { return ref(p, n); },
        async transaction(fn) {
          const snap = await this.once();
          const next = fn(snap.val());
          await this.set(next);
          return { committed: true, snapshot: createCloudSnapshot(next) };
        }
      };
    }
    return { ref };
  }
  function makeCloudCurrentUser(user) {
    return {
      uid: user.id,
      email: user.email || '',
      async updatePassword(newPassword) {
        await cloudRequest('./api/auth/update-password', { method: 'POST', body: { password: newPassword } });
      }
    };
  }
  function createCloudAuth() {
    const state = { currentUser: null, listeners: [] };
    async function resolveCurrentUser() {
      const session = currentCloudSession();
      if (!session || !session.access_token) return null;
      const data = await cloudRequest('./api/auth/user');
      state.currentUser = makeCloudCurrentUser(data.user);
      return state.currentUser;
    }
    function emit() { state.listeners.forEach(cb => cb(state.currentUser)); }
    return {
      get currentUser() { return state.currentUser; },
      onAuthStateChanged(cb) {
        state.listeners.push(cb);
        resolveCurrentUser().then(user => cb(user)).catch(() => { clearCloudSession(); cb(null); });
        return () => { state.listeners = state.listeners.filter(x => x !== cb); };
      },
      async signInWithEmailAndPassword(email, password) {
        const data = await cloudRequest('./api/auth/password', { method: 'POST', body: { email, password } });
        saveCloudSession(data.session);
        state.currentUser = makeCloudCurrentUser(data.user);
        emit();
        return { user: state.currentUser };
      },
      async signOut() {
        clearCloudSession();
        state.currentUser = null;
        emit();
      },
      startOAuth
    };
  }
  async function createCloudBackend() {
    try {
      await captureCloudSessionFromCallback();
    } catch (err) {
      // Any OAuth-callback failure surfaces as a clean toast but must not
      // block the app from booting in the signed-out state.
      console.warn('OAuth callback', err);
      toast((err && err.message) || 'OAuth-Rückgabe fehlgeschlagen.', 'error');
    }
    const cfg = await cloudRequest('./api/config');
    if (!cfg || !cfg.configured) throw new Error('Cloud API nicht konfiguriert.');
    CLOUD_CONFIG = cfg;
    async function createUser(username, password, profile) {
      return cloudRequest('./api/users', { method: 'POST', body: { username, password, profile } });
    }
    return { db: createCloudDatabase(), auth: createCloudAuth(), createUser };
  }
  function enabledCloudOAuthProviders() {
    const configured = CLOUD_CONFIG && CLOUD_CONFIG.auth && Array.isArray(CLOUD_CONFIG.auth.providers)
      ? CLOUD_CONFIG.auth.providers
      : FREE_CLOUD_OAUTH_PROVIDER_IDS;
    const enabled = new Set(configured);
    return CLOUD_OAUTH_PROVIDERS.filter(provider => enabled.has(provider.id));
  }

  // -----------------------------------------------------------------
  // 2. Service Worker (Blob URL) – Network-first caching + push handler
  // -----------------------------------------------------------------
  const swCode = `
    const CACHE = 'minis-wettstetten-v2';
    const PRECACHE = ['/', location.href];

    self.addEventListener('install', (e) => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(PRECACHE).catch(() => {})));
    });
    self.addEventListener('activate', (e) => {
      e.waitUntil(Promise.all([
        caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))),
        self.clients.claim()
      ]));
    });
    self.addEventListener('fetch', (e) => {
      const req = e.request;
      if (req.method !== 'GET') return;
      const url = new URL(req.url);
      if (url.protocol !== 'http:' && url.protocol !== 'https:') return;
      if (/supabase\\.co|cdnjs\\.cloudflare\\.com/.test(req.url)) return; // Let external live traffic handle itself
      e.respondWith((async () => {
        try {
          const fresh = await fetch(req);
          try { const c = await caches.open(CACHE); c.put(req, fresh.clone()); } catch (_) {}
          return fresh;
        } catch (_) {
          const cached = await caches.match(req);
          if (cached) return cached;
          if (req.mode === 'navigate') {
            const fallback = await caches.match('/');
            if (fallback) return fallback;
          }
          return new Response('Offline', { status: 503, statusText: 'Offline' });
        }
      })());
    });
    self.addEventListener('push', (e) => {
      let data = { title: 'Minis Wettstetten', body: 'Neue Nachricht.' };
      try { if (e.data) data = Object.assign(data, e.data.json()); } catch (_) {}
      e.waitUntil(self.registration.showNotification(data.title, {
        body: data.body,
        icon: data.icon,
        badge: data.badge,
        tag: data.tag || 'minis',
        data: data.data || {}
      }));
    });
    self.addEventListener('notificationclick', (e) => {
      e.notification.close();
      e.waitUntil(self.clients.matchAll({ type: 'window' }).then(list => {
        for (const c of list) if ('focus' in c) return c.focus();
        if (self.clients.openWindow) return self.clients.openWindow('/');
      }));
    });
  `;

  function registerServiceWorker() {
    if (ACTIVE_BACKEND === BACKENDS.MOCK && urlParams.get('mock') === '1') return;
    if (!('serviceWorker' in navigator)) return;
    // Bevorzugt: echte Datei ./sw.js (nötig für PWA-Installierbarkeit –
    // Blob-URLs haben einen begrenzten Scope, den Browser ablehnen).
    navigator.serviceWorker.register('./sw.js', { scope: './' }).catch((err) => {
      console.warn('SW Datei nicht erreichbar, fallback auf Blob.', err);
      try {
        const blob = new Blob([swCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        navigator.serviceWorker.register(url).catch(e => console.warn('SW blob fallback failed', e));
      } catch (e) { console.warn('SW blob failed', e); }
    });
  }

  // -----------------------------------------------------------------
  // 3. XSS-safe DOM helpers
  // -----------------------------------------------------------------
  function h(tag, attrs, children) {
    const el = document.createElement(tag);
    if (attrs && typeof attrs === 'object' && !Array.isArray(attrs) && !(attrs instanceof Node)) {
      for (const k in attrs) {
        if (!Object.prototype.hasOwnProperty.call(attrs, k)) continue;
        const v = attrs[k];
        if (v === false || v == null) continue;
        if (k === 'class' || k === 'className') el.className = String(v);
        else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
        else if (k === 'dataset' && typeof v === 'object') Object.assign(el.dataset, v);
        else if (k === 'text') el.textContent = String(v); // NEVER innerHTML for user data
        else if (k.slice(0, 2) === 'on' && typeof v === 'function') {
          el.addEventListener(k.slice(2).toLowerCase(), v);
        } else if (k === 'html') {
          // Explicit opt-in (never used with user data)
          el.innerHTML = String(v);
        } else if (v === true) {
          el.setAttribute(k, '');
        } else {
          el.setAttribute(k, String(v));
        }
      }
    } else if (attrs != null) {
      // Treat second arg as children shortcut
      children = attrs;
    }
    appendChildren(el, children);
    return el;
  }
  function appendChildren(el, children) {
    if (children == null || children === false) return;
    if (Array.isArray(children)) {
      for (const c of children) appendChildren(el, c);
    } else if (children instanceof Node) {
      el.appendChild(children);
    } else {
      el.appendChild(document.createTextNode(String(children)));
    }
  }
  function clear(el) { while (el && el.firstChild) el.removeChild(el.firstChild); }
  function icon(name, { label, family } = {}) {
    const i = h('i', { class: (family === 'brands' ? 'fa-brands' : 'fa-solid') + ' fa-' + name, 'aria-hidden': label ? 'false' : 'true' });
    if (label) i.setAttribute('aria-label', label);
    return i;
  }

  // -----------------------------------------------------------------
  // 4. Toast system (replaces alert)
  // -----------------------------------------------------------------
  const toastContainer = () => document.getElementById('toast-container');
  function toast(message, kind) {
    kind = kind || 'info';
    const c = toastContainer();
    if (!c) return;
    const t = h('div', { class: 'toast ' + kind, role: kind === 'error' ? 'alert' : 'status', 'aria-live': kind === 'error' ? 'assertive' : 'polite' }, [
      icon(kind === 'error' ? 'triangle-exclamation' : kind === 'success' ? 'check' : kind === 'warn' ? 'circle-info' : 'info'),
      h('div', { style: { flex: 1 }, text: message })
    ]);
    c.appendChild(t);
    setTimeout(() => {
      t.style.transition = 'opacity 240ms ease';
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 260);
    }, kind === 'error' ? 6500 : 4200);
  }

  // -----------------------------------------------------------------
  // 5. Date / business utilities (pure, testable)
  // -----------------------------------------------------------------
  const DAY_MS = 24 * 60 * 60 * 1000;

  function daysBetween(aMs, bMs) { return (bMs - aMs) / DAY_MS; }
  function addDays(ms, n) { return ms + n * DAY_MS; }
  function isPast(ms, now) { return ms < (now == null ? Date.now() : now); }
  function formatDateTime(ms) {
    try { return new Date(ms).toLocaleString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch (_) { return new Date(ms).toISOString(); }
  }
  function localDateTimeInputValue(ms) {
    const d = new Date(ms);
    const pad = (n) => String(n).padStart(2, '0');
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function parseDateTimeLocal(str) {
    if (!str) return NaN;
    const d = new Date(str);
    return d.getTime();
  }
  /**
   * Liefert true, wenn die Austragung VERSPÄTET wäre (innerhalb der Frist).
   * deadlineDays: Anzahl Tage vor Termin, ab denen Frist gilt.
   */
  function isLateCancellation(serviceStartMs, deadlineDays, now) {
    const n = now == null ? Date.now() : now;
    const diffDays = daysBetween(n, serviceStartMs);
    return diffDays < deadlineDays;
  }
  function generateWeeklySeries(startMs, count) {
    count = Math.max(1, Math.min(52, count | 0));
    const out = [];
    for (let i = 0; i < count; i++) out.push(addDays(startMs, 7 * i));
    return out;
  }
  function sanitizePlainText(s) {
    // Belt-and-braces; actual XSS protection is done via textContent everywhere.
    if (s == null) return '';
    return String(s).replace(/[\x00-\x1F\x7F\x80-\x9F]/g, '').slice(0, 8000);
  }
  function usernameToEmail(u) {
    return String(u || '').trim().toLowerCase() + MAIL_DOMAIN;
  }
  function validUsername(u) { return /^[a-z0-9._-]{2,40}$/.test(String(u || '').trim().toLowerCase()); }
  function validPassword(p) { return typeof p === 'string' && p.length >= 8; }

    return ROLE_DEFINITIONS[role] || ROLE_DEFINITIONS.user;

  function roleLabel(role) {

  function roleAtLeast(role, minRole) {

  function canAccessView(view, role) {
    if (view === VIEWS.LOGIN || view === VIEWS.DEV_LOGIN) return true;

    return item ? roleAtLeast(role, item.minRole) : false;

  function roleOptions() {
    return ROLE_SELECT_ORDER.map(role => ({ role, def: getRoleDefinition(role) }));
  }

  const listeners = Object.create(null);
  function on(event, fn) { (listeners[event] = listeners[event] || []).push(fn); }
  function emit(event, data) {
    const ls = listeners[event] || [];
    for (const fn of ls) { try { fn(data); } catch (e) { console.error(e); } }
  }

  const state = new Proxy({
    view: VIEWS.LOGIN,
    user: null,           // {uid, email, username, role, displayName, mustChangePassword}
    services: [],
    users: {},            // publicProfiles: username + displayName only
    privateUsers: {},     // administrative registry: role + operational flags
    chatMessages: [],
    stats: {},
    lastSystemAlertTs: 0,
    devOverride: false,
    installAvailable: false,
    online: navigator.onLine,
    booted: false,
  }, {
    set(t, p, v) {
      const old = t[p];
      t[p] = v;
      if (old !== v) emit('state:' + p, { old: old, new: v });
      emit('state', { key: p, old: old, new: v });
      return true;
    }
  });

  let deferredInstallPrompt = null;

  function isStandaloneDisplayMode() {
    const standaloneMedia = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches;
    const iosStandalone = !!(window.navigator && window.navigator.standalone);
    return standaloneMedia || iosStandalone;
  }

  function updateInstallAvailability(available) {
    state.installAvailable = !!available && !isStandaloneDisplayMode();
  }

  function canPromptInstallApp() {
    return !!deferredInstallPrompt && state.installAvailable && !isStandaloneDisplayMode();
  }

  async function promptInstallApp() {
    if (!canPromptInstallApp()) {
      toast(PWA_INSTALL_UNAVAILABLE_MESSAGE, 'info');
      return;
    }
    const promptEvent = deferredInstallPrompt;
    deferredInstallPrompt = null;
    updateInstallAvailability(false);
    try {
      await promptEvent.prompt();
      if (promptEvent.userChoice) {
        const choice = await promptEvent.userChoice.catch(() => null);
        if (choice && choice.outcome === 'accepted') toast(PWA_INSTALLED_MESSAGE, 'success');
      }
    } catch (_) {

    }, [icon('download'), h('span', { class: 'btn-label', text: PWA_INSTALL_LABEL })]);

  window.addEventListener('beforeinstallprompt', (event) => {
    if (typeof event.prompt !== 'function') return;

  // -----------------------------------------------------------------
  // 7. Modal system with focus trap (ARIA-dialog)
  // -----------------------------------------------------------------
  let openModals = []; // stack of { el, opts, prevFocus }
  function openModal(opts) {
    // opts: { title, subtitle, content(Node|Node[]), actions(Node[]), forced, dismissible, onClose }
    const prevFocus = document.activeElement;
    const backdrop = h('div', {
      class: 'modal-backdrop' + (opts.forced ? ' forced' : ''),
      role: 'presentation'
    });
    const dialog = h('div', {
      class: 'modal',
      role: 'dialog',
      'aria-modal': 'true',
      'aria-labelledby': 'modal-title-' + Date.now(),
      tabindex: '-1'
    });
    const titleId = dialog.getAttribute('aria-labelledby');
    if (opts.title) dialog.appendChild(h('h2', { id: titleId, text: opts.title }));
    if (opts.subtitle) dialog.appendChild(h('p', { class: 'modal-sub', text: opts.subtitle }));
    if (opts.content) appendChildren(dialog, opts.content);
    if (opts.actions && opts.actions.length) {
      dialog.appendChild(h('div', { class: 'modal-actions' }, opts.actions));
    }
    backdrop.appendChild(dialog);
    document.getElementById('modal-root').appendChild(backdrop);
    if (opts.forced) document.body.classList.add('forced-modal-open');
    const rec = { el: backdrop, opts, prevFocus };
    openModals.push(rec);

    function close(result) {
      if (opts.forced && rec.forcedLocked) return;
      backdrop.removeEventListener('keydown', onKeyDown);
      backdrop.removeEventListener('click', onBackdropClick);
      backdrop.remove();
      openModals = openModals.filter(r => r !== rec);
      if (!openModals.some(r => r.opts.forced)) document.body.classList.remove('forced-modal-open');
      try { prevFocus && prevFocus.focus && prevFocus.focus(); } catch (_) {}
      if (typeof opts.onClose === 'function') try { opts.onClose(result); } catch (_) {}
    }
    function focusables() {
      return Array.from(dialog.querySelectorAll(
        'a[href], button:not([disabled]), textarea:not([disabled]), input:not([disabled]):not([type=hidden]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
      ));
    }
    function onKeyDown(e) {
      if (e.key === 'Escape') {
        if (!opts.forced && opts.dismissible !== false) { e.preventDefault(); close(); }
        return;
      }
      if (e.key === 'Tab') {
        const list = focusables();
        if (!list.length) { e.preventDefault(); dialog.focus(); return; }
        const first = list[0], last = list[list.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }
    function onBackdropClick(e) {
      if (e.target === backdrop && !opts.forced && opts.dismissible !== false) close();
    }
    backdrop.addEventListener('keydown', onKeyDown);
    backdrop.addEventListener('click', onBackdropClick);

    setTimeout(() => {
      const list = focusables();
      (list[0] || dialog).focus();
    }, 0);

    rec.close = close;
    return rec;
  }
  function confirmDialog({ title, message, confirmText, cancelText, danger }) {
    return new Promise(resolve => {
      let decided = false;
      const confirmBtn = h('button', { class: 'btn ' + (danger ? 'btn-danger' : 'btn-primary'), text: confirmText || 'Bestätigen',
        onclick: () => { decided = true; rec.close(true); resolve(true); } });
      const cancelBtn = h('button', { class: 'btn btn-ghost', text: cancelText || 'Abbrechen',
        onclick: () => { decided = true; rec.close(false); resolve(false); } });
      const rec = openModal({
        title,
        content: h('p', { text: message }),
        actions: [cancelBtn, confirmBtn],
        onClose: () => { if (!decided) resolve(false); }
      });
    });
  }

  // -----------------------------------------------------------------
  // 8. Authentication + roles
  // -----------------------------------------------------------------
  let pendingLoginMinRole = null;

  function roleRestrictedLoginMessage(minRole) {
    if (minRole === ROLES.ADMIN) return 'Dieser Login ist nur für Oberminis und Entwickler.';
    if (minRole === ROLES.DEV) return 'Dieser Login ist nur für Entwickler.';
    return 'Keine Berechtigung für diesen Login.';
  }

  async function loginWithUsername(username, password, minRole) {
    if (!validUsername(username)) throw new Error('Ungültiger Benutzername.');
    if (!validPassword(password)) throw new Error('Passwort muss mindestens 8 Zeichen haben.');
    const email = usernameToEmail(username);
    pendingLoginMinRole = minRole || null;
    try {
      const cred = await auth.signInWithEmailAndPassword(email, password);
      return cred.user;
    } catch (e) {
      pendingLoginMinRole = null;
      throw e;
    }
  }
  async function logout() {
    try { if (state.devOverride) { state.devOverride = false; state.user = null; state.view = VIEWS.LOGIN; return; } }
    catch (_) {}
    try { await auth.signOut(); } catch (_) {}
    state.user = null;
    state.view = VIEWS.LOGIN;
  }
  function enterDevMode(masterkey) {
    if (masterkey !== DEV_MASTERKEY) { toast('Falscher Entwickler-Schlüssel.', 'error'); return false; }
    state.devOverride = true;
    state.user = { uid: '__dev__', username: 'dev', email: 'dev' + MAIL_DOMAIN, displayName: 'Entwickler', role: ROLES.DEV, mustChangePassword: false };
    state.view = VIEWS.HOME;
    try { bootstrapSubscriptions(); } catch (e) { console.warn(e); }
    toast('Entwickler-Modus aktiviert (lokal).', 'success');
    return true;
  }

  async function syncPublicProfile(uid, profile) {
    await db.ref(dbPath(DB_PATHS.PUBLIC_PROFILES, uid)).set(publicProfileFromUser(profile));
  }

  async function loadUserProfile(fbUser) {
    const uid = fbUser.uid;
    const snap = await db.ref(dbPath(DB_PATHS.USERS, uid)).once('value');
    const profile = snap.val();
    if (!profile || !profile.username || !profile.role) {
      throw new Error('Kein freigegebenes Benutzerprofil vorhanden. Bitte einen Entwickler bitten, den Benutzer anzulegen.');
    }
    syncPublicProfile(uid, profile).catch(err => console.warn('public profile sync', err));
    return {
      uid,
      email: fbUser.email,
      username: profile.username,
      displayName: profile.displayName || profile.username,
      role: profile.role,
      mustChangePassword: !!profile.mustChangePassword
    };
  }

  async function onAuthChanged(fbUser) {
    if (!fbUser) {
      state.user = null;
      if (!state.devOverride) state.view = VIEWS.LOGIN;
      return;
    }
    try {
      const profile = await loadUserProfile(fbUser);
      if (pendingLoginMinRole && !roleAtLeast(profile.role, pendingLoginMinRole)) {
        const msg = roleRestrictedLoginMessage(pendingLoginMinRole);
        pendingLoginMinRole = null;
        try { await auth.signOut(); } catch (_) {}
        state.user = null;
        state.view = VIEWS.LOGIN;
        toast(msg, 'error');
        return;
      }
      pendingLoginMinRole = null;
      state.user = profile;
      state.view = VIEWS.HOME;
      if (profile.mustChangePassword) showForcedPasswordModal();
      bootstrapSubscriptions();
      initNotifications().catch(() => {});
    } catch (e) {
      console.error(e);
      toast('Profil konnte nicht geladen werden: ' + e.message, 'error');
    }
  }

  // -----------------------------------------------------------------
  // 9. Forced password change
  // -----------------------------------------------------------------
  function showForcedPasswordModal() {
    const pw1 = h('input', { class: 'input', type: 'password', autocomplete: 'new-password', 'aria-label': 'Neues Passwort', minlength: '8', required: true });
    const pw2 = h('input', { class: 'input', type: 'password', autocomplete: 'new-password', 'aria-label': 'Passwort bestätigen', minlength: '8', required: true });
    const msg = h('p', { class: 'text-muted', text: 'Aus Sicherheitsgründen muss dein Passwort jetzt geändert werden. Wähle ein neues Passwort mit mindestens 8 Zeichen.' });
    const btn = h('button', { type: 'submit', class: 'btn btn-primary', text: 'Passwort setzen' });

    async function submit(e) {
      if (e) e.preventDefault();
      if (pw1.value !== pw2.value) return toast('Passwörter stimmen nicht überein.', 'error');
      if (!validPassword(pw1.value)) return toast('Mindestens 8 Zeichen.', 'error');
      btn.disabled = true;
      try {
        await auth.currentUser.updatePassword(pw1.value);
        await db.ref(dbPath(DB_PATHS.USERS, auth.currentUser.uid, 'mustChangePassword')).set(false);
        rec.forcedLocked = false;
        rec.close();
        state.user = Object.assign({}, state.user, { mustChangePassword: false });
        toast('Passwort aktualisiert.', 'success');
      } catch (err) {
        btn.disabled = false;
        toast('Fehler: ' + err.message, 'error');
      }
    }

    const form = h('form', {
      class: 'stack',
      onsubmit: submit,
      novalidate: true,
      'aria-label': 'Pflicht-Passwortwechsel',
      autocomplete: 'off'
    }, [
      msg,
      h('div', { class: 'field' }, [h('label', { text: 'Neues Passwort' }), pw1]),
      h('div', { class: 'field' }, [h('label', { text: 'Bestätigung' }), pw2]),
      h('div', { class: 'modal-actions' }, [btn])
    ]);

    const rec = openModal({
      title: 'Passwort ändern (Pflicht)',
      content: form,
      forced: true,
      dismissible: false
    });
    rec.forcedLocked = true;
  }

  // -----------------------------------------------------------------
  // 10. Services / Planner
  // -----------------------------------------------------------------
  async function createService(data, { repeatWeekly12 } = {}) {
    requireRole(ROLES.ADMIN);
    const base = {
      title: sanitizePlainText(data.title).slice(0, 120),
      description: sanitizePlainText(data.description || '').slice(0, 1200),
      deadlineDays: Math.max(0, Math.min(30, Number(data.deadlineDays) || 0)),
      minSlots: Math.max(1, Math.min(50, Number(data.minSlots) || 1)),
      color: /^#[0-9a-fA-F]{6}$/.test(data.color) ? data.color : '#0066cc',
      createdBy: state.user.uid,
      createdAt: Date.now(),
      replacement: false,
      attendees: {}
    };
    const series = repeatWeekly12 ? generateWeeklySeries(data.startMs, 12) : [data.startMs];
    const writes = series.map(ms => {
      const ref = db.ref(DB_PATHS.SERVICES).push();
      return ref.set(Object.assign({}, base, { startMs: ms, id: ref.key }));
    });
    await Promise.all(writes);
    toast(repeatWeekly12 ? '12 Termine erstellt.' : 'Dienst erstellt.', 'success');
  }
  async function updateService(id, patch) {
    requireRole(ROLES.ADMIN);
    await db.ref(dbPath(DB_PATHS.SERVICES, id)).update(patch);
  }
  async function deleteService(id) {
    requireRole(ROLES.ADMIN);
    await db.ref(dbPath(DB_PATHS.SERVICES, id)).remove();
  }

  async function signUp(serviceId) {
    const u = state.user;
    if (!u) return;
    await db.ref(dbPath(DB_PATHS.SERVICES, serviceId, 'attendees', u.uid)).set({
      uid: u.uid, username: u.username, displayName: u.displayName || u.username, ts: Date.now()
    });
    toast('Eingetragen.', 'success');
  }

  async function signOff(serviceId) {
    const u = state.user;
    if (!u) return;
    const service = state.services.find(s => s.id === serviceId);
    if (!service) return;
    const late = isLateCancellation(service.startMs, service.deadlineDays || 0);
    if (late) {
      const ok = await confirmDialog({
        title: 'Frist unterschritten',
        message: 'Die Abmeldefrist ist abgelaufen. Es wird eine Ersatzsuche gestartet. Trotzdem austragen?',
        confirmText: 'Trotzdem austragen',
        cancelText: 'Eingetragen bleiben',
        danger: true
      });
      if (!ok) return;
      const writes = [
        db.ref(dbPath(DB_PATHS.SERVICES, serviceId, 'attendees', u.uid)).remove(),
        db.ref(dbPath(DB_PATHS.SERVICES, serviceId, 'replacement')).set(true),
        incrementStat(u.uid, 'lateCancelled')
      ];
      await Promise.all(writes);
      const svcLabel = service.title + ' am ' + formatDateTime(service.startMs);
      await postSystemMessage('SYSTEM: ' + (u.displayName || u.username) + ' hat sich kurzfristig abgemeldet. Ersatz gesucht für: ' + svcLabel + '!');
      toast('Austragung gespeichert – Ersatzsuche aktiviert.', 'warn');
    } else {
      const writes = [
        db.ref(dbPath(DB_PATHS.SERVICES, serviceId, 'attendees', u.uid)).remove(),
        incrementStat(u.uid, 'cancelled')
      ];
      await Promise.all(writes);
      toast('Ausgetragen.', 'success');
    }
  }

  function requireRole(minRole) {
    const u = state.user;
    if (!u || !roleAtLeast(u.role, minRole)) {
      throw new Error('Keine Berechtigung.');
    }
  }

  // -----------------------------------------------------------------
  // 11. Statistics engine
  // -----------------------------------------------------------------
  async function incrementStat(uid, key) {
    const ref = db.ref(dbPath(DB_PATHS.STATS, uid, key));
    try {
      await ref.transaction(v => (v || 0) + 1);
    } catch (e) {
      const cur = (await ref.once('value')).val() || 0;
      await ref.set(cur + 1);
    }
  }

  async function recomputeAttendanceForPastServices() {
    // One-pass: every past service increments attended for attendees that are still listed.
    // Idempotence via marker /services/{id}/statsApplied = true
    const now = Date.now();
    const servicesSnap = await db.ref(DB_PATHS.SERVICES).once('value');
    const services = servicesSnap.val() || {};
    const jobs = [];
    for (const id in services) {
      const s = services[id];
      if (!s || s.statsApplied) continue;
      if (s.startMs < now) {
        const atts = s.attendees || {};
        for (const uid in atts) jobs.push(incrementStat(uid, 'attended'));
        jobs.push(db.ref(dbPath(DB_PATHS.SERVICES, id, 'statsApplied')).set(true));
      }
    }
    if (jobs.length) await Promise.all(jobs);
  }

  // -----------------------------------------------------------------
  // 12. Chat
  // -----------------------------------------------------------------
  function subscribeChat() {
    db.ref(DB_PATHS.CHAT).limitToLast(CHAT_LIMIT).on('value', snap => {
      const val = snap.val() || {};
      const list = Object.keys(val).map(k => Object.assign({ id: k }, val[k]));
      list.sort((a, b) => (a.ts || 0) - (b.ts || 0));
      state.chatMessages = list;
      // System alert on load if there's a fresh system message (<2h)
      const fresh = list.filter(m => m.system && (Date.now() - (m.ts || 0)) < SYSTEM_ALERT_WINDOW_MS);
      if (fresh.length && state.lastSystemAlertTs < (fresh[fresh.length - 1].ts || 0)) {
        state.lastSystemAlertTs = fresh[fresh.length - 1].ts || 0;
        toast('Wichtig: Neue Systemmeldungen im Chat!', 'warn');
      }
    });
  }

  async function sendChat(text) {
    text = sanitizePlainText(text).slice(0, 2000);
    if (!text) return;
    const u = state.user;
    if (!u) throw new Error('Nicht angemeldet.');
    await db.ref(DB_PATHS.CHAT).push({
      uid: u.uid, username: u.username, displayName: u.displayName || u.username,
      text, ts: Date.now(), system: false
    });
  }

  async function postSystemMessage(text) {
    const u = state.user;
    const safeText = sanitizePlainText(text).slice(0, 2000);
    if (!safeText) return;
    try {
      await db.ref(DB_PATHS.CHAT).push({
        uid: '__system__', username: 'SYSTEM', displayName: 'SYSTEM',
        text: safeText,
        ts: Date.now(),
        system: true,
        triggeredBy: u && u.uid ? u.uid : null
      });
      return;
    } catch (err) {
      if (!u) throw err;
      console.warn('system chat message rejected, posting user-visible fallback', err);
    }
    await db.ref(DB_PATHS.CHAT).push({
      uid: u.uid, username: u.username, displayName: u.displayName || u.username,
      text: safeText,
      ts: Date.now(),
      system: false
    });
  }

  // -----------------------------------------------------------------
  // 14. Database Backup (Dev)
  // -----------------------------------------------------------------
  async function exportDatabase() {
    requireRole(ROLES.DEV);
    let data;
    if (ACTIVE_BACKEND === BACKENDS.CLOUD) {
      data = {};
      for (const path of CLOUD_BACKUP_PATHS) {
        const snap = await db.ref(path).once('value');
        data[path] = snap.val() || {};
      }
    } else {
      const snap = await db.ref('/').once('value');
      data = snap.val() || {};
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = h('a', { href: url, download: 'minis-backup-' + new Date().toISOString().replace(/[:.]/g, '-') + '.json' });
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { a.remove(); URL.revokeObjectURL(url); }, 0);
    toast('Backup heruntergeladen.', 'success');
  }
  async function importDatabase(file) {
    requireRole(ROLES.DEV);
    if (ACTIVE_BACKEND === BACKENDS.CLOUD) {
      toast('Cloud-Import ist in der App deaktiviert. Nutze ein geprüftes serverseitiges Migrationsskript.', 'warn');
      return;
    }
    const text = await file.text();
    let parsed;
    try { parsed = JSON.parse(text); }
    catch (_) { return toast('Ungültige JSON-Datei.', 'error'); }
    const ok = await confirmDialog({
      title: 'Datenbank überschreiben?',
      message: 'Die gesamte Datenbank wird mit dem Inhalt der Datei überschrieben. Dies ist unwiderruflich. Fortfahren?',
      confirmText: 'Überschreiben',
      danger: true
    });
    if (!ok) return;
    await db.ref('/').set(parsed);
    toast('Datenbank wiederhergestellt.', 'success');
  }

  function mapAuthError(e) {
    const m = (e && (e.code || e.message)) || '';
    if (/user-not-found/.test(m)) return 'Benutzer nicht gefunden.';
    if (/wrong-password|invalid-login|invalid_login|invalid-credential/.test(m)) return 'Falsches Passwort.';
    if (/too-many-requests/.test(m)) return 'Zu viele Versuche. Bitte später erneut.';
    return 'Anmeldung fehlgeschlagen: ' + (e.message || m);
  }

    const u = state.user || {};
    const attendees = s.attendees || {};

    const isSignedUp = !!attendees[u.uid];
    const low = count < (s.minSlots || 1);
    const card = h('div', {
      class: 'service-card' + (s.replacement ? ' replacement' : ''),
      style: { borderLeftColor: s.color || '#0066cc' },
      role: 'button',
      tabindex: '0',
      'aria-label': 'Gottesdienst ' + s.title + ' am ' + formatDateTime(s.startMs),
      onclick: () => openServiceDetail(s),
      onkeydown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openServiceDetail(s); } }
    });
    card.appendChild(h('div', { class: 'row-1' }, [
      h('h3', { text: s.title }),
      s.replacement ? h('span', { class: 'badge-replacement' }, [icon('triangle-exclamation'), 'Ersatz gesucht']) : null
    ]));
    card.appendChild(h('div', { class: 'meta' }, [
      icon('clock'), ' ', formatDateTime(s.startMs),
      '  •  ',
      icon('people-group'), ' ',
      h('span', { class: 'pill' + (low ? ' low' : ' slots'), text: count + ' / ' + (s.minSlots || 1) })

    ]);
    card.appendChild(actions);
    return card;

  function openServiceDetail(s) {
    const content = h('div', { class: 'stack' });
    content.appendChild(h('p', { class: 'text-muted', text: formatDateTime(s.startMs) }));
    if (s.description) content.appendChild(h('p', { text: s.description }));
    const list = h('ul', { style: { paddingLeft: '18px' } });
    const attendees = s.attendees || {};
    for (const uid in attendees) {
      list.appendChild(h('li', { text: attendees[uid].displayName || attendees[uid].username || uid }));
    }
    if (!Object.keys(attendees).length) list.appendChild(h('li', { text: 'Noch niemand eingetragen.' }));

    content.appendChild(list);

  // ----- Chat view -----
  function renderChatView() {
    const section = h('section', { 'aria-labelledby': 'chat-title' });
    section.appendChild(h('div', { class: 'section-title' }, [
      h('h2', { id: 'chat-title', text: 'Chat' }),
      h('span', { class: 'text-muted', text: 'letzte ' + CHAT_LIMIT + ' Nachrichten' })
    ]));
    const list = h('div', { class: 'chat-list', id: 'chat-list', role: 'log', 'aria-live': 'polite', 'aria-relevant': 'additions' });
    for (const m of state.chatMessages) list.appendChild(renderChatMessage(m));
    section.appendChild(list);
    setTimeout(() => { list.scrollTop = list.scrollHeight; }, 0);

    const input = h('input', { class: 'input', 'aria-label': 'Nachricht eingeben', placeholder: 'Nachricht…', maxlength: '2000' });
    const btn = h('button', { class: 'btn btn-primary', 'aria-label': 'Senden' }, [icon('paper-plane'), 'Senden']);
    const send = async () => {
      const t = input.value; if (!t.trim()) return;
      btn.disabled = true;
      try { await sendChat(t); input.value = ''; }
      catch (e) { toast(e.message, 'error'); }
      finally { btn.disabled = false; input.focus(); }
    };
    btn.addEventListener('click', send);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
    section.appendChild(h('form', {
      class: 'chat-form no-print',
      onsubmit: (e) => { e.preventDefault(); send(); }
    }, [input, btn]));
    return section;
  }

    const deadline = h('input', { class: 'input', type: 'number', min: '0', max: '30', value: existing ? (existing.deadlineDays || 3) : 3, 'aria-label': 'Abmeldefrist in Tagen' });

          title: title.value, description: desc.value, startMs,
          minSlots: minSlots.value, deadlineDays: deadline.value, color: color.value
        };
        try {
          if (existing) {
            await updateService(existing.id, {
              title: sanitizePlainText(payload.title).slice(0, 120),
              description: sanitizePlainText(payload.description).slice(0, 1200),
              startMs: payload.startMs,
              minSlots: Math.max(1, Math.min(50, Number(payload.minSlots) || 1)),
              deadlineDays: Math.max(0, Math.min(30, Number(payload.deadlineDays) || 0)),

            });

    const displayName = h('input', { class: 'input', type: 'text', autocomplete: 'name', 'aria-label': 'Anzeigename', placeholder: 'Max Mustermann' });

      if (!validUsername(u)) return toast('Ungültiger Benutzername (nur a-z 0-9 . _ -, 2–40 Zeichen).', 'error');

        return toast('Backend unterstützt keine Benutzer-Erstellung.', 'error');
      }
      submitBtn.disabled = true;
      try {
        await createUserOnBackend(u, p, {
          displayName: sanitizePlainText(displayName.value).slice(0, 60) || u,
          role: roleSelect.value,
          mustChangePassword: !!mustChange.checked

  // -----------------------------------------------------------------
  // 16. Subscriptions bootstrap
  // -----------------------------------------------------------------
  function bootstrapSubscriptions() {
    db.ref(DB_PATHS.SERVICES).on('value', snap => {
      const v = snap.val() || {};
      state.services = Object.keys(v).map(k => Object.assign({ id: k }, v[k]));
    });
    db.ref(DB_PATHS.PUBLIC_PROFILES).on('value', snap => { state.users = snap.val() || {}; });
    if (state.user && roleAtLeast(state.user.role, ROLES.ADMIN)) {
      db.ref(DB_PATHS.USERS).on('value', snap => { state.privateUsers = snap.val() || {}; });
    } else if (state.user && state.user.uid) {
      db.ref(dbPath(DB_PATHS.USERS, state.user.uid)).on('value', snap => {
        const profile = snap.val();
        state.privateUsers = profile ? { [state.user.uid]: profile } : {};
      });
    }
    if (state.user && roleAtLeast(state.user.role, ROLES.ADMIN)) {
      db.ref(DB_PATHS.STATS).on('value', snap => { state.stats = snap.val() || {}; });
    } else if (state.user && state.user.uid) {
      db.ref(dbPath(DB_PATHS.STATS, state.user.uid)).on('value', snap => {
        const ownStats = snap.val();
        state.stats = ownStats ? { [state.user.uid]: ownStats } : {};
      });
    }
    subscribeChat();
    if (state.user && roleAtLeast(state.user.role, ROLES.ADMIN)) {
      recomputeAttendanceForPastServices().catch(err => console.warn('stats recompute', err));
    }
  }
